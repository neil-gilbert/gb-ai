<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GB-AI Offline</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #0b1221;
    }

    .panel {
      width: min(92vw, 520px);
      border: 1px solid #e2e8f0;
      border-top: 4px solid #00247d;
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.4rem;
    }

    p {
      margin: 0;
      color: #475569;
      font-size: 1rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>You're offline</h1>
    <p>Reconnect to continue chatting with GB-AI.</p>
  </main>
</body>
</html>
